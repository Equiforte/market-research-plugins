---
# YAML Schema for daily-brief/YYYY-MM-DD.yaml
# Used by post-generate hook and CI validation

required_fields:
  - name: title
    type: string
    description: "Full title — e.g., 'Daily Market Brief'"

  - name: date
    type: string
    format: "YYYY-MM-DD"
    description: "Publication date"

  - name: author
    type: string
    value: "Equiforte Intelligence"
    description: "Always 'Equiforte Intelligence'"

  - name: status
    type: string
    enum: ["published", "draft"]
    description: "Publication status"

  - name: summary
    type: string
    max_length: 200
    description: "Homepage card summary — under 200 chars"

  - name: preview
    type: string
    format: html
    description: "Ungated HTML content — sections 1-2 (Market Snapshot + Regulatory Watch)"

  - name: full_content
    type: string
    format: html
    description: "Gated HTML content — all 6 sections (superset of preview)"

validation_rules:
  - rule: "File MUST start with '---' on line 1"
  - rule: "summary length <= 200 characters"
  - rule: "preview content must appear verbatim in full_content"
  - rule: "full_content must contain all 6 section headers: Market Snapshot, Regulatory Watch, Operational Intel, Data Snapshot, The CFO Take, Coming This Week"
  - rule: "All & in HTML must be escaped as &amp;"
  - rule: "No fabricated data — use N/A for unavailable values"

section_headers:
  - "<h3>1. Market Snapshot</h3>"
  - "<h3>2. Regulatory Watch</h3>"
  - "<h3>3. Operational Intel</h3>"
  - "<h3>4. Data Snapshot</h3>"
  - "<h3>5. The CFO Take</h3>"
  - "<h3>6. Coming This Week</h3>"

filename_pattern: "YYYY-MM-DD.yaml"
