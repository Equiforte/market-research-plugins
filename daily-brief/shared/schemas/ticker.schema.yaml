---
# YAML Schema for ticker/latest.yaml
# Used by post-generate hook and CI validation

required_fields:
  - name: date
    type: string
    format: "YYYY-MM-DD"
    description: "Date of the data"

  - name: updated_at
    type: string
    format: "ISO 8601 timestamp with timezone"
    description: "When the ticker was last updated"

  - name: items
    type: array
    min_items: 4
    max_items: 6
    description: "Ticker banner items"
    item_schema:
      required_fields:
        - name: text
          type: string
          max_length: 80
          description: "Display text — metric + direction + value"
        - name: category
          type: string
          enum: ["equity", "rates", "commodity", "volatility"]
          description: "Asset class category"

validation_rules:
  - rule: "File MUST start with '---' on line 1"
  - rule: "items array must have 4-6 entries"
  - rule: "Each item text must be under 80 characters"
  - rule: "Each item must have text and category fields"
  - rule: "Use ▲ for up, ▼ for down direction indicators"
  - rule: "Mix positive and negative indicators for balance"

filename: "latest.yaml"
